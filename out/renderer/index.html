<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
    <title>Webfont Converter</title>
    <script type="module" crossorigin src="./assets/index-Da9zrCn7.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CA_whfZ2.css">
  </head>
  <body>
    <div id="app">
      <section
        id="drop-zone"
        aria-label="Drop zone for font files or folders"
        aria-dropeffect="copy"
      >
        <div class="drop-zone__icon" aria-hidden="true">Aa</div>
        <p class="drop-zone__text">Drop fonts or folders here</p>
        <p class="drop-zone__hint">.ttf &nbsp;&nbsp; .otf &nbsp;&nbsp; or directory</p>
      </section>

      <ul id="file-list" aria-label="Staged font families" aria-live="polite"></ul>

      <button id="convert-btn" type="button" disabled>
        Convert Fonts
      </button>

      <section id="progress-section" aria-label="Conversion progress" hidden>
        <div
          class="progress-bar"
          role="progressbar"
          aria-valuenow="0"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-label="Conversion progress"
        >
          <div class="progress-bar__fill"></div>
          <span class="progress-bar__count" aria-live="polite">0 / 0</span>
        </div>
        <p id="progress-step" aria-live="polite"></p>
      </section>
    </div>

  </body>
</html>
