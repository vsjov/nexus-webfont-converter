appId: com.bitersen.webfont-converter
productName: Webfont Converter
copyright: Copyright © 2025 Vladimir Jovanović

extraMetadata:
  main: out/main/index.js

directories:
  output: release
  buildResources: build-resources

files:
  - out/**/*

# Skip rebuilding native modules that are dev-only (e.g. @parcel/watcher used by electron-vite)
buildDependenciesFromSource: false
npmRebuild: false

win:
  target:
    - target: nsis
    - target: portable

mac:
  target:
    - target: dmg

linux:
  target:
    - target: AppImage
